<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="img-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e6e3"/>
      <stop offset="50%" style="stop-color:#d4d1cc"/>
      <stop offset="100%" style="stop-color:#e8e6e3"/>
    </linearGradient>
    <linearGradient id="fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fafaf9;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#fafaf9;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="630" fill="#fafaf9"/>

  <!-- Hero image placeholder area -->
  <rect width="1200" height="340" fill="url(#img-bg)"/>

  <!-- Subtle vault layer motif in the image area -->
  <g opacity="0.08">
    <rect x="340" y="80" width="520" height="36" rx="4" fill="#1a1a1a"/>
    <rect x="340" y="124" width="520" height="36" rx="4" fill="#1a1a1a"/>
    <rect x="340" y="168" width="520" height="36" rx="4" fill="#1a1a1a"/>
    <rect x="340" y="212" width="520" height="36" rx="4" fill="#1a1a1a"/>
    <rect x="340" y="256" width="520" height="36" rx="4" fill="#1a1a1a"/>
  </g>
  <g opacity="0.15">
    <text x="360" y="105" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="12" fill="#1a1a1a" letter-spacing="2">SOURCE</text>
    <text x="360" y="149" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="12" fill="#1a1a1a" letter-spacing="2">SPRINGS</text>
    <text x="360" y="193" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="12" fill="#1a1a1a" letter-spacing="2">STREAMS</text>
    <text x="360" y="237" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="12" fill="#1a1a1a" letter-spacing="2">INTELLIGENCE</text>
    <text x="360" y="281" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="12" fill="#1a1a1a" letter-spacing="2">AGENTS</text>
  </g>

  <!-- Fade from image to white -->
  <rect y="280" width="1200" height="60" fill="url(#fade)"/>

  <!-- Brand name -->
  <text x="600" y="410" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="400" fill="#1a1a1a" text-anchor="middle" letter-spacing="-1">FonteOS</text>

  <!-- Tagline -->
  <text x="600" y="460" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="400" fill="#1a1a1a" text-anchor="middle" letter-spacing="-0.5">A brain for Claude Code</text>
  <text x="600" y="496" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="400" fill="#1a1a1a" text-anchor="middle" letter-spacing="-0.5">that persists between sessions.</text>

  <!-- Subtitle -->
  <text x="600" y="545" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#6b6560" text-anchor="middle">Persistent memory, project isolation, and session continuity for solo founders.</text>

  <!-- CTAs -->
  <g transform="translate(460, 570)">
    <rect width="130" height="40" rx="20" fill="#1a1a1a"/>
    <text x="65" y="26" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#ffffff" text-anchor="middle">Get Started</text>
  </g>
  <g transform="translate(610, 570)">
    <rect width="130" height="40" rx="20" fill="none" stroke="#d4d1cc" stroke-width="1.5"/>
    <text x="65" y="26" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#1a1a1a" text-anchor="middle">GitHub</text>
  </g>
</svg>
