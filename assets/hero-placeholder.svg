<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#141414"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="dim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6b7280"/>
      <stop offset="100%" style="stop-color:#9ca3af"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="63" x2="1200" y2="63"/>
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="189" x2="1200" y2="189"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="441" x2="1200" y2="441"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="0" y1="567" x2="1200" y2="567"/>
  </g>

  <!-- Accent line top -->
  <rect x="80" y="140" width="48" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Eyebrow -->
  <text x="80" y="172" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="500" letter-spacing="3" fill="#2563eb" text-transform="uppercase">FOR CLAUDE CODE + OBSIDIAN</text>

  <!-- Main headline -->
  <text x="80" y="240" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="56" font-weight="700" fill="#f5f5f4" letter-spacing="-1.5">Give Claude Code a brain</text>
  <text x="80" y="305" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="56" font-weight="400" fill="#6b7280" letter-spacing="-1.5">it keeps between sessions.</text>

  <!-- Subtext -->
  <text x="80" y="370" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" fill="#9ca3af" letter-spacing="0.2">Persistent memory, project isolation, and session continuity.</text>
  <text x="80" y="396" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" fill="#9ca3af" letter-spacing="0.2">Through markdown files you own, not a service you rent.</text>

  <!-- Terminal preview -->
  <g transform="translate(80, 440)">
    <rect width="360" height="120" rx="8" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1"/>
    <!-- Terminal dots -->
    <circle cx="20" cy="16" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="16" r="5" fill="#febc2e"/>
    <circle cx="52" cy="16" r="5" fill="#28c840"/>
    <text x="78" y="19" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="10" fill="#555">terminal</text>
    <!-- Terminal content -->
    <text x="16" y="52" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="13" fill="#3ecf8e">$</text>
    <text x="32" y="52" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="13" fill="#e2ddd8">claude</text>
    <text x="16" y="76" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="13" fill="#4f8ef7">/start</text>
    <text x="16" y="100" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#666">Session loaded. 3 springs, 2 issues in Todo.</text>
  </g>

  <!-- Right side: layer stack -->
  <g transform="translate(700, 160)">
    <!-- Source layer -->
    <rect width="420" height="56" rx="6" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
    <text x="20" y="22" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="10" fill="#2563eb" letter-spacing="1.5">SOURCE</text>
    <text x="20" y="42" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#e5e5e5">Mission, priorities, registries</text>
    <text x="340" y="42" font-family="'SF Mono', monospace" font-size="11" fill="#555">core.md</text>

    <!-- Springs layer -->
    <rect y="64" width="420" height="56" rx="6" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
    <text x="20" y="86" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="10" fill="#16a34a" letter-spacing="1.5">SPRINGS</text>
    <text x="20" y="106" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#e5e5e5">Projects and ventures</text>
    <text x="320" y="106" font-family="'SF Mono', monospace" font-size="11" fill="#555">_index.md</text>

    <!-- Streams layer -->
    <rect y="128" width="420" height="56" rx="6" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
    <text x="20" y="150" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="10" fill="#d97706" letter-spacing="1.5">STREAMS</text>
    <text x="20" y="170" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#e5e5e5">Active workstreams</text>
    <text x="300" y="170" font-family="'SF Mono', monospace" font-size="11" fill="#555">daily work</text>

    <!-- Intelligence layer -->
    <rect y="192" width="420" height="56" rx="6" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
    <text x="20" y="214" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="10" fill="#7c3aed" letter-spacing="1.5">INTELLIGENCE</text>
    <text x="20" y="234" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#e5e5e5">Research-backed reference</text>
    <text x="292" y="234" font-family="'SF Mono', monospace" font-size="11" fill="#555">graduated</text>

    <!-- Tags -->
    <g transform="translate(0, 280)">
      <rect width="64" height="24" rx="4" fill="rgba(22,163,74,0.15)" stroke="rgba(22,163,74,0.3)" stroke-width="1"/>
      <text x="12" y="16" font-family="'SF Mono', monospace" font-size="11" font-weight="500" fill="#16a34a">ships</text>

      <rect x="76" width="68" height="24" rx="4" fill="rgba(37,99,235,0.15)" stroke="rgba(37,99,235,0.3)" stroke-width="1"/>
      <text x="88" y="16" font-family="'SF Mono', monospace" font-size="11" font-weight="500" fill="#3b82f6">builds</text>

      <rect x="156" width="68" height="24" rx="4" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
      <text x="168" y="16" font-family="'SF Mono', monospace" font-size="11" font-weight="500" fill="#7c3aed">learns</text>

      <text x="244" y="16" font-family="system-ui, sans-serif" font-size="12" fill="#555">pattern tracking built in</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="#0f0f0f"/>
  <text x="80" y="620" font-family="'SF Mono', monospace" font-size="11" fill="#444" letter-spacing="0.5">fonteos.com</text>
  <text x="1030" y="620" font-family="'SF Mono', monospace" font-size="11" fill="#444" letter-spacing="0.5">MIT License</text>
</svg>
